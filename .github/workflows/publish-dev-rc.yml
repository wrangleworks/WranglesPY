name: Publish Dev Release Candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Base version e.g. 1.20.0  (rcN suffix is appended automatically)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wrangleworks/wrangles

jobs:
  # ── 1. Validate branch + input, compute the next rcN version ─────────────
  compute-version:
    name: Compute RC Version
    runs-on: ubuntu-latest
    outputs:
      rc_version: ${{ steps.compute.outputs.rc_version }}
    steps:
      - name: Guard – dev branch only
        if: github.ref != 'refs/heads/dev'
        run: |
          echo "::error::This workflow may only be triggered from the 'dev' branch. Current ref: ${{ github.ref }}"
          exit 1

      - name: Validate version input format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version input '${{ inputs.version }}' is invalid. Expected format: MAJOR.MINOR.PATCH (e.g. 1.20.0)"
            exit 1
          fi

      - name: Compute next RC version from PyPI
        id: compute
        env:
          BASE: ${{ inputs.version }}
        run: |
          RC_VERSION=$(python3 - <<'PYEOF'
          import json, re, urllib.request, os, sys
          base = os.environ["BASE"]
          try:
              req = urllib.request.urlopen("https://pypi.org/pypi/wrangles/json", timeout=15)
              data = json.load(req)
              releases = data.get("releases", {})
          except Exception as e:
              print(f"Warning: could not reach PyPI ({e}); assuming no RC exists", file=sys.stderr)
              releases = {}
          pat = re.compile(rf"^{re.escape(base)}rc(\d+)$")
          nums = [int(m.group(1)) for v in releases if (m := pat.match(v))]
          print(f"{base}rc{max(nums) + 1 if nums else 1}")
          PYEOF
          )
          echo "rc_version=${RC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved RC version: ${RC_VERSION}"

  # ── 2a. Full pytest suite ─────────────────────────────────────────────────
  pytest:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [compute-version]
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==9.0.2 lorem pytest-mock
          pip install google-genai
          pip install -r requirements.txt
          pip install .

      - name: Run Tests
        run: pytest
        env:
          WRANGLES_USER: ${{ secrets.WRANGLES_USER }}
          WRANGLES_PASSWORD: ${{ secrets.WRANGLES_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  # ── 2b. Pip-install smoke test ────────────────────────────────────────────
  test-pip-install:
    name: Smoke Test – pip install
    runs-on: ubuntu-latest
    needs: [compute-version]
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Test pip install
        run: |
          python -m pip install --upgrade pip
          pip install .
          wrangles.recipe tests/samples/generate-data.wrgl.yml

  # ── 3. Publish Python package to PyPI ────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [compute-version, pytest, test-pip-install]
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing
    env:
      RC_VERSION: ${{ needs.compute-version.outputs.rc_version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Patch version in setup.py
        run: |
          sed -i "s/^\(\s*version\s*=\s*\).*/\1'${RC_VERSION}',/" setup.py
          echo "setup.py version line after patch:"
          grep "version" setup.py

      - name: Install build
        run: python -m pip install build --user

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel --outdir dist/ .

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── 4. Build and push Docker RC image ─────────────────────────────────────
  publish-docker:
    name: Publish Docker RC Image
    runs-on: ubuntu-latest
    needs: [compute-version, pytest, test-pip-install]
    permissions:
      contents: read
      packages: write
    env:
      RC_VERSION: ${{ needs.compute-version.outputs.rc_version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Patch version in setup.py
        run: |
          sed -i "s/^\(\s*version\s*=\s*\).*/\1'${RC_VERSION}',/" setup.py

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RC_VERSION }}
          labels: ${{ steps.meta.outputs.labels }}
